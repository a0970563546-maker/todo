<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#2563eb">
<title>待辦事項追蹤系統</title>
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="favicon-32.png">
<meta name="apple-mobile-web-app-title" content="待辦追蹤">
<meta name="apple-mobile-web-app-capable" content="yes">
<style>
  :root{
    --bg:#f4f6fb; --card:#ffffff; --ink:#1e293b; --muted:#64748b;
    --line:#e5e9f2; --brand:#2563eb; --brand-d:#1d4ed8;
    --shadow:0 1px 3px rgba(15,23,42,.08),0 1px 2px rgba(15,23,42,.04);
    --radius:14px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
    background:var(--bg); color:var(--ink); font-size:15px; line-height:1.5;
    padding-bottom:90px;
  }
  header{
    position:sticky; top:0; z-index:30; background:rgba(255,255,255,.92);
    backdrop-filter:saturate(180%) blur(12px);
    border-bottom:1px solid var(--line); padding:12px 16px;
  }
  .h-row{display:flex; align-items:center; gap:10px; max-width:1100px; margin:0 auto}
  .h-row h1{font-size:18px; margin:0; flex:1; font-weight:700}
  .h-row .count{font-size:12px; color:var(--muted); font-weight:600}
  .btn{
    border:0; cursor:pointer; border-radius:10px; font-weight:600; font-size:14px;
    padding:9px 14px; background:var(--brand); color:#fff; transition:.15s;
  }
  .btn:active{transform:scale(.96)}
  .btn.ghost{background:#eef2fb; color:var(--brand-d)}
  .btn.sm{padding:6px 10px; font-size:13px}
  .wrap{max-width:1100px; margin:0 auto; padding:14px 16px}

  .eng-bar{
    display:flex; align-items:center; gap:10px; background:linear-gradient(100deg,#fff7ed,#ffedd5);
    border:1px solid #fed7aa; border-radius:14px; padding:11px 14px; margin-bottom:6px; box-shadow:var(--shadow);
  }
  .eng-bar .ico{font-size:22px}
  .eng-bar .txt{flex:1; min-width:0}
  .eng-bar .txt b{font-size:14px; color:#9a3412}
  .eng-bar .txt small{display:block; color:#c2410c; font-size:12px}
  .eng-bar a{
    background:#ea580c; color:#fff; text-decoration:none; font-weight:700; font-size:13.5px;
    padding:10px 14px; border-radius:10px; white-space:nowrap;
  }
  .eng-bar a:active{transform:scale(.96)}

  .search{
    width:100%; padding:11px 14px; border:1px solid var(--line); border-radius:12px;
    font-size:15px; background:#fff; outline:none; box-shadow:var(--shadow); margin-top:12px;
  }
  .search:focus{border-color:var(--brand)}
  .chips{display:flex; gap:8px; overflow-x:auto; padding:12px 0 4px; scrollbar-width:none}
  .chips::-webkit-scrollbar{display:none}
  .chip{
    flex:0 0 auto; padding:7px 13px; border-radius:999px; border:1px solid var(--line);
    background:#fff; color:var(--muted); font-size:13px; font-weight:600; cursor:pointer; white-space:nowrap;
  }
  .chip.on{background:var(--brand); color:#fff; border-color:var(--brand)}
  .toolbar{display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-top:4px}
  .toolbar select{
    padding:8px 10px; border:1px solid var(--line); border-radius:10px; background:#fff;
    font-size:13px; color:var(--ink); font-weight:600;
  }
  .spacer{flex:1}

  .group-title{font-size:13px; font-weight:700; color:var(--muted); margin:18px 4px 8px; display:flex; align-items:center; gap:8px}
  .group-title .dot{width:9px; height:9px; border-radius:50%}
  .card{
    background:var(--card); border:1px solid var(--line); border-left-width:5px;
    border-radius:var(--radius); padding:13px 14px; margin-bottom:10px; box-shadow:var(--shadow);
    display:flex; gap:12px; align-items:flex-start;
  }
  .card.done{opacity:.55}
  .check{
    flex:0 0 auto; width:24px; height:24px; border-radius:50%; border:2px solid #cbd5e1;
    margin-top:2px; cursor:pointer; display:flex; align-items:center; justify-content:center;
    color:#fff; font-size:14px; transition:.15s;
  }
  .check.on{background:#16a34a; border-color:#16a34a}
  .c-body{flex:1; min-width:0; cursor:pointer}
  .c-title{font-weight:600; font-size:15px; word-break:break-word}
  .card.done .c-title{text-decoration:line-through}
  .c-meta{display:flex; flex-wrap:wrap; gap:6px; margin-top:7px; align-items:center}
  .tag{font-size:11.5px; font-weight:700; padding:3px 8px; border-radius:6px; white-space:nowrap}
  .c-note{font-size:13px; color:var(--muted); margin-top:6px; white-space:pre-wrap; word-break:break-word}
  .date{font-size:12.5px; font-weight:700; padding:3px 8px; border-radius:6px; background:#f1f5f9; color:#475569}
  .date.today{background:#fef3c7; color:#92400e}
  .docbar{margin-top:8px}
  .docprog{font-size:12px; font-weight:700; color:#0e7490; background:#ecfeff; padding:3px 8px; border-radius:6px; display:inline-block}
  .c-act{display:flex; flex-direction:column; gap:4px; align-items:center}
  .icon-btn{border:0; background:transparent; cursor:pointer; font-size:17px; padding:4px; color:var(--muted); border-radius:8px}
  .icon-btn:active{background:#f1f5f9}
  .icon-btn.bell-on{filter:none}
  .empty{text-align:center; color:var(--muted); padding:50px 20px}
  .empty .big{font-size:40px; margin-bottom:10px}

  .fab{
    position:fixed; right:18px; bottom:22px; z-index:40; width:58px; height:58px; border-radius:50%;
    background:var(--brand); color:#fff; border:0; font-size:30px; line-height:1; cursor:pointer;
    box-shadow:0 8px 22px rgba(37,99,235,.45);
  }
  .fab:active{transform:scale(.94)}

  .overlay{
    position:fixed; inset:0; background:rgba(15,23,42,.45); z-index:50; display:none;
    align-items:flex-end; justify-content:center;
  }
  .overlay.on{display:flex}
  .sheet{
    background:#fff; width:100%; max-width:560px; border-radius:20px 20px 0 0; padding:18px 18px 26px;
    max-height:92vh; overflow-y:auto; animation:up .22s ease;
  }
  @keyframes up{from{transform:translateY(40px); opacity:.6}to{transform:none; opacity:1}}
  @media(min-width:600px){ .overlay{align-items:center} .sheet{border-radius:20px} }
  .sheet h2{margin:2px 0 16px; font-size:18px}
  .field{margin-bottom:13px}
  .field label{display:block; font-size:13px; font-weight:700; color:var(--muted); margin-bottom:5px}
  .field input,.field select,.field textarea{
    width:100%; padding:11px 12px; border:1px solid var(--line); border-radius:11px; font-size:15px;
    font-family:inherit; background:#fff; outline:none;
  }
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--brand)}
  .field textarea{resize:vertical; min-height:64px}
  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:11px}
  .sheet-act{display:flex; gap:10px; margin-top:8px}
  .sheet-act .btn{flex:1; padding:13px}
  .btn.danger{background:#fee2e2; color:#b91c1c}
  .btn.line{background:#fff; border:1px solid var(--line); color:var(--ink)}

  /* doc checklist */
  .doclist{border:1px solid var(--line); border-radius:11px; padding:8px; max-height:180px; overflow:auto}
  .docrow{display:flex; align-items:center; gap:8px; padding:5px 4px}
  .docrow input[type=checkbox]{width:18px; height:18px; flex:0 0 auto}
  .docrow .dt{flex:1; font-size:14px}
  .docrow .dt.done{text-decoration:line-through; color:var(--muted)}
  .docrow .x{cursor:pointer; color:#b91c1c; font-weight:700; padding:2px 6px}
  .docadd{display:flex; gap:8px; margin-top:8px}
  .docadd input{flex:1}
  .docadd button{flex:0 0 auto; padding:0 14px}
  .doc-empty{color:var(--muted); font-size:13px; text-align:center; padding:10px}

  /* remind options */
  .ropt{display:flex; flex-direction:column; gap:8px; margin-bottom:12px}
  .ropt label{display:flex; align-items:center; gap:10px; border:1px solid var(--line); border-radius:11px; padding:11px 12px; cursor:pointer; font-weight:600; font-size:14px}
  .ropt label.sel{border-color:var(--brand); background:#eff5ff}
  .ropt input[type=radio]{width:18px; height:18px}
  .note-tip{font-size:12px; color:var(--muted); background:#f8fafc; border-radius:10px; padding:9px 11px; margin-top:4px}

  .menu{position:relative}
  .menu-pop{
    position:absolute; right:0; top:42px; background:#fff; border:1px solid var(--line);
    border-radius:12px; box-shadow:0 10px 30px rgba(15,23,42,.18); padding:6px; display:none; z-index:60; min-width:190px;
  }
  .menu-pop.on{display:block}
  .menu-pop button{
    display:block; width:100%; text-align:left; border:0; background:transparent; padding:10px 12px;
    font-size:14px; border-radius:8px; cursor:pointer; color:var(--ink)
  }
  .menu-pop button:active{background:#f1f5f9}
  .hidefile{display:none}

  /* ===== cat playground ===== */
  .playground{
    position:relative; margin:26px 0 8px; height:170px; border-radius:18px; overflow:hidden;
    background:linear-gradient(180deg,#eef4ff 0%,#f6f1ff 55%,#fef6ec 100%);
    border:1px solid var(--line);
  }
  .pg-floor{position:absolute; left:0; right:0; bottom:0; height:46px; background:linear-gradient(180deg,#fbe7c9,#f3d6a8)}
  .pg-cap{position:absolute; top:10px; left:0; right:0; text-align:center; font-size:12.5px; font-weight:700; color:#8b6f4e; letter-spacing:.5px}
  .cat{position:absolute; bottom:22px}
  .cat.gold{left:8%; width:150px}
  .cat.grey{left:34%; width:150px; bottom:22px}
  .rosiya{position:absolute; right:5%; bottom:16px; width:96px; height:96px; z-index:2; animation:rosbob 4s ease-in-out infinite}
  .rosiya img{width:100%; height:100%; border-radius:50%; object-fit:cover; border:4px solid #fff; box-shadow:0 5px 12px rgba(0,0,0,.2); display:block}
  @keyframes rosbob{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
  .cat-name{position:absolute; bottom:4px; font-size:12px; font-weight:800; padding:2px 12px; border-radius:999px; box-shadow:var(--shadow); z-index:3}
  .gold-name{left:13%; background:#fde9c4; color:#9a6b1f; border:1px solid #f3cf8f}
  .grey-name{left:37%; background:#e8ebee; color:#566069; border:1px solid #cdd3d8}
  .rosiya-name{right:8%; background:#dfe6ec; color:#3f4a55; border:1px solid #c4cfd8}
  .yarn{position:absolute; bottom:34px; left:24%; width:30px; margin-left:-15px; animation:yarn 2.4s ease-in-out infinite}
  @keyframes yarn{0%,100%{transform:translateY(0) rotate(0)}25%{transform:translateY(-46px) translateX(-16px) rotate(-120deg)}50%{transform:translateY(-8px) rotate(-200deg)}75%{transform:translateY(-40px) translateX(16px) rotate(-320deg)}}
  .heart{position:absolute; font-size:15px; opacity:0; animation:heart 3.6s ease-in infinite}
  .h1{left:26%; animation-delay:.2s} .h2{left:62%; animation-delay:1.6s} .h3{left:46%; animation-delay:2.8s}
  @keyframes heart{0%{opacity:0; transform:translateY(0) scale(.6)}15%{opacity:.9}60%{opacity:.6}100%{opacity:0; transform:translateY(-70px) scale(1.1)}}
  .blink{animation:blink 4.5s infinite; transform-box:fill-box; transform-origin:center}
  @keyframes blink{0%,92%,100%{transform:scaleY(1)}96%{transform:scaleY(.1)}}
  .tail-g{animation:tailg 2.8s ease-in-out infinite; transform-box:fill-box; transform-origin:top left}
  @keyframes tailg{0%,100%{transform:rotate(0)}50%{transform:rotate(13deg)}}
  .tail-y{animation:taily 1.5s ease-in-out infinite; transform-box:fill-box; transform-origin:bottom left}
  @keyframes taily{0%,100%{transform:rotate(-6deg)}50%{transform:rotate(10deg)}}
  .paw-bat{animation:paw 1.2s ease-in-out infinite; transform-box:fill-box; transform-origin:top center}
  @keyframes paw{0%,100%{transform:rotate(0)}50%{transform:rotate(-22deg)}}
  .ear-tw{animation:ear 3.5s ease-in-out infinite; transform-box:fill-box; transform-origin:bottom center}
  @keyframes ear{0%,90%,100%{transform:rotate(0)}94%{transform:rotate(-9deg)}}
  .body-wig{animation:wig 1.8s ease-in-out infinite; transform-box:fill-box; transform-origin:bottom center}
  @keyframes wig{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-3px) rotate(1.5deg)}}
  /* walking black cat */
  .blackcat{position:absolute; bottom:10px; left:50%; transform:translateX(-50%); width:64px; z-index:2}
  @keyframes bcwalk{0%{left:5%;transform:scaleX(1)}46%{left:78%;transform:scaleX(1)}50%{left:78%;transform:scaleX(-1)}96%{left:5%;transform:scaleX(-1)}100%{left:5%;transform:scaleX(1)}}
  .blackcat .bc-in{display:block; width:100%; height:auto; animation:bcbob 3.4s ease-in-out infinite; filter:drop-shadow(0 3px 3px rgba(0,0,0,.12))}
  @keyframes bcbob{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-2px) scale(1.02)}}
  .bc-tail{animation:bctail 1.2s ease-in-out infinite; transform-box:fill-box; transform-origin:bottom right}
  @keyframes bctail{0%,100%{transform:rotate(-7deg)}50%{transform:rotate(11deg)}}
  .bc-legA{animation:bclegA .5s linear infinite; transform-box:fill-box; transform-origin:top center}
  .bc-legB{animation:bclegB .5s linear infinite; transform-box:fill-box; transform-origin:top center}
  @keyframes bclegA{0%,100%{transform:rotate(13deg)}50%{transform:rotate(-13deg)}}
  @keyframes bclegB{0%,100%{transform:rotate(-13deg)}50%{transform:rotate(13deg)}}
  .bc-twinkle{animation:bctwinkle 1.6s ease-in-out infinite; transform-box:fill-box; transform-origin:center}
  @keyframes bctwinkle{0%,100%{opacity:.3;transform:scale(.7)}50%{opacity:1;transform:scale(1.15)}}
  @media(max-width:480px){
    .cat.gold{width:104px} .cat.grey{width:112px} .playground{height:150px} .rosiya{width:70px;height:70px}
  }
</style>
</head>
<body>

<header>
  <div class="h-row">
    <h1>📋 待辦事項追蹤系統</h1>
    <span class="count" id="syncBadge" style="color:#16a34a"></span>
    <span class="count" id="count"></span>
    <div class="menu">
      <button class="btn ghost sm" id="menuBtn">⋯</button>
      <div class="menu-pop" id="menuPop">
        <button onclick="openCloud()">☁️ 雲端同步設定</button>
        <button onclick="askNotify()">🔔 開啟桌面提醒通知</button>
        <button onclick="exportJSON()">⬇️ 匯出備份 (JSON)</button>
        <button onclick="exportCSV()">📄 匯出 Excel/CSV</button>
        <button onclick="document.getElementById('importFile').click()">⬆️ 匯入備份</button>
        <button onclick="loadSamples()">✨ 載入範例資料</button>
        <button onclick="clearDone()">🧹 清除已完成</button>
        <button onclick="clearAll()" style="color:#b91c1c">🗑️ 清除全部資料</button>
      </div>
    </div>
  </div>
</header>

<div class="wrap">
  <div class="eng-bar">
    <span class="ico">🏗️</span>
    <span class="txt"><b>工程管理系統 Pro</b><small>點右側按鈕開啟工程管理網頁</small></span>
    <a href="https://a0970563546-maker.github.io/engmanagement/" target="_blank" rel="noopener">開啟系統 ↗</a>
  </div>

  <input class="search" id="search" placeholder="🔍 搜尋事項、備註、協作窗口…">
  <div class="chips" id="chips"></div>
  <div class="toolbar">
    <select id="sort">
      <option value="date">依日期</option>
      <option value="created">依新增時間</option>
      <option value="cat">依類別</option>
    </select>
    <select id="statusFilter">
      <option value="active">未完成</option>
      <option value="all">全部</option>
      <option value="done">已完成</option>
    </select>
    <span class="spacer"></span>
    <button class="btn ghost sm" onclick="openForm()">＋ 新增</button>
  </div>

  <div id="list"></div>

  <!-- cat playground -->
  <div class="playground" aria-hidden="true">
    <div class="pg-cap">Rosiya 看著 Q比 & 酷比 玩耍 🐾</div>
    <div class="pg-floor"></div>
    <span class="heart h1">💛</span><span class="heart h2">🩶</span><span class="heart h3">💛</span>
    <div id="goldCat" class="cat gold"></div>
    <div id="yarnBall" class="yarn"></div>
    <div id="greyCat" class="cat grey"></div>
    <div class="cat-name gold-name">Q比</div>
    <div class="cat-name grey-name">酷比</div>
    <div class="rosiya" aria-hidden="true"><img src="rosiya.png" alt="" draggable="false"></div>
    <div class="cat-name rosiya-name">Rosiya</div>
  </div>
</div>

<button class="fab" onclick="openForm()">＋</button>
<input type="file" id="importFile" class="hidefile" accept=".json,application/json" onchange="importJSON(event)">

<!-- form modal -->
<div class="overlay" id="overlay">
  <div class="sheet">
    <h2 id="formTitle">新增事項</h2>
    <input type="hidden" id="f_id">
    <div class="field">
      <label>事項標題 *</label>
      <input id="f_title" placeholder="例如：A棟3F 室內裝修圖說送審">
    </div>
    <div class="grid2">
      <div class="field">
        <label>類別</label>
        <select id="f_cat"></select>
      </div>
      <div class="field">
        <label>狀態</label>
        <select id="f_status"></select>
      </div>
    </div>
    <div class="field">
      <label>日期</label>
      <input type="date" id="f_due">
    </div>

    <div class="field">
      <label>協作窗口（可多位，填寫人名與負責內容）</label>
      <div class="doclist" id="peopleList"></div>
      <div class="docadd">
        <input id="peopleInput" placeholder="例如：王先生 - 木作工程" onkeydown="if(event.key==='Enter'){addPerson();event.preventDefault();}">
        <button class="btn ghost" onclick="addPerson()">＋ 加入</button>
      </div>
    </div>

    <div class="field">
      <label>資料項目清單（可追蹤多份文件，逐項勾選）</label>
      <div class="doclist" id="docList"></div>
      <div class="docadd">
        <input id="docInput" placeholder="新增一份資料，例如：消防排煙計算書" onkeydown="if(event.key==='Enter'){addDoc();event.preventDefault();}">
        <button class="btn ghost" onclick="addDoc()">＋ 加入</button>
      </div>
    </div>

    <div class="field">
      <label>備註 / 進度記錄</label>
      <textarea id="f_note" placeholder="送審文號、補正事項、會議結論、待確認重點…"></textarea>
    </div>
    <div class="sheet-act">
      <button class="btn danger" id="delBtn" onclick="delItem()" style="display:none">刪除</button>
      <button class="btn line" onclick="closeForm()">取消</button>
      <button class="btn" onclick="saveItem()">儲存</button>
    </div>
  </div>
</div>

<!-- cloud sync modal -->
<div class="overlay" id="cloudOverlay">
  <div class="sheet" style="max-width:470px">
    <h2>☁️ 雲端同步設定</h2>
    <div class="note-tip" style="margin-bottom:12px">貼上 Google 試算表 Apps Script 的「Web App」網址，手機與電腦打開此網頁就會共用同一份資料（每約 15 秒自動同步）。留空＝只存在本機。<br>設定步驟請見「上架與手機使用說明」。</div>
    <div class="field">
      <label>Apps Script Web App 網址</label>
      <input id="cloudInput" placeholder="https://script.google.com/macros/s/.../exec">
    </div>
    <div class="sheet-act">
      <button class="btn line" onclick="closeCloud()">取消</button>
      <button class="btn" onclick="saveCloud()">儲存並連線</button>
    </div>
  </div>
</div>

<!-- reminder modal -->
<div class="overlay" id="remindOverlay">
  <div class="sheet" style="max-width:440px">
    <h2>🔔 設定提醒</h2>
    <input type="hidden" id="r_id">
    <div id="r_title" style="font-weight:700; margin-bottom:14px"></div>
    <div class="ropt" id="ropt">
      <label><input type="radio" name="rtype" value="none"><span>不提醒</span></label>
      <label><input type="radio" name="rtype" value="daily"><span>每日提醒（工作日早上 10:00 通知，排除週末及國定假日）</span></label>
      <label><input type="radio" name="rtype" value="date"><span>指定日期提醒</span></label>
    </div>
    <div class="field" id="rdateWrap" style="display:none">
      <label>提醒日期</label>
      <input type="date" id="r_date">
    </div>
    <div class="note-tip">此為「網頁內提醒」，只有在你打開這個網頁時才會跳通知（需先到「⋯」選單授權）。<br>👉 想要「關掉網頁也會準時通知」，請改用卡片上的 📅 按鈕加入 Google 日曆。</div>
    <div class="sheet-act" style="margin-top:14px">
      <button class="btn line" onclick="closeRemind()">取消</button>
      <button class="btn" onclick="saveRemind()">儲存</button>
    </div>
  </div>
</div>

<script>
const CATS = [
  {k:"裝修審查", label:"室內裝修審查送審", color:"#7c3aed"},
  {k:"工程相關", label:"工程相關", color:"#ea580c"},
  {k:"文書作業", label:"文書作業", color:"#0891b2"},
  {k:"一般待辦", label:"一般待辦 / 提醒", color:"#2563eb"},
  {k:"會議記錄", label:"會議記錄", color:"#16a34a"},
  {k:"其他", label:"其他", color:"#db2777"},
];
const STATUS = ["待處理","進行中","已送出","已結案"];
const STATUS_MAP = {"待審查/待回覆":"進行中","已完成":"已結案","已擱置":"待處理"};
const KEY = "design_todo_v1";
const REMIND_HOUR = 10; // 每日提醒時間：早上10點
// 台灣國定假日（含補假）。2026年已取消補班，故無補班日需扣除。
const HOLIDAYS = [
  // 2026 (115年)
  "2026-01-01",
  "2026-02-14","2026-02-15","2026-02-16","2026-02-17","2026-02-18","2026-02-19","2026-02-20","2026-02-21","2026-02-22", // 春節
  "2026-02-27","2026-02-28", // 228（2/28逢週六，2/27補假）
  "2026-04-03","2026-04-04","2026-04-05","2026-04-06", // 兒童/清明（含補假）
  "2026-05-01", // 勞動節
  "2026-06-19", // 端午
  "2026-09-25","2026-09-28", // 中秋、教師節
  "2026-10-09","2026-10-10", // 國慶（10/10逢週六，10/9補假）
  "2026-10-25","2026-10-26", // 光復節（10/25逢週日，10/26補假）
  "2026-12-25", // 行憲紀念日
  // 2027 已知
  "2027-01-01"
];
function isWorkday(dateStr, dow){
  if(dow===0 || dow===6) return false;      // 週六、週日
  if(HOLIDAYS.includes(dateStr)) return false; // 國定假日／補假
  return true;
}

let data = load();
let filterCat = "all";
let formDocs = [];     // temp docs while editing
let formPeople = [];   // temp collaborators while editing

function load(){
  let arr=[];
  try{ arr=JSON.parse(localStorage.getItem(KEY))||[] }catch(e){ arr=[] }
  // migrate old data
  arr.forEach(it=>{
    if(it.cat==="工程進場") it.cat="工程相關";
    if(!it.docs) it.docs=[];
    if(it.remind===undefined) it.remind="none";
    if(STATUS_MAP[it.status]) it.status=STATUS_MAP[it.status];
    if(!it.people){ it.people = it.owner ? [{t:it.owner, done:false}] : []; }
    delete it.pri; delete it.seq; delete it.owner;
  });
  return arr;
}
function save(){ localStorage.setItem(KEY, JSON.stringify(data)); render(); cloudPush(); }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function catOf(k){ return CATS.find(c=>c.k===k)||CATS[5]; }
function todayStr(){ const d=new Date(); return d.getFullYear()+"-"+("0"+(d.getMonth()+1)).slice(-2)+"-"+("0"+d.getDate()).slice(-2); }

/* ---------- controls ---------- */
function initControls(){
  const cat=document.getElementById("f_cat"); cat.innerHTML="";
  CATS.forEach(c=>cat.innerHTML+=`<option value="${c.k}">${c.label}</option>`);
  const st=document.getElementById("f_status"); st.innerHTML="";
  STATUS.forEach(s=>st.innerHTML+=`<option value="${s}">${s}</option>`);
  const chips=document.getElementById("chips");
  chips.innerHTML=`<span class="chip ${filterCat==='all'?'on':''}" onclick="setCat('all')">全部</span>`;
  CATS.forEach(c=>{
    chips.innerHTML+=`<span class="chip ${filterCat===c.k?'on':''}" onclick="setCat('${c.k}')">${c.label}</span>`;
  });
}
function setCat(k){ filterCat=k; initControls(); render(); }

/* ---------- date display ---------- */
function dateInfo(d){
  if(!d) return null;
  const dt=new Date(d+"T00:00:00");
  const md=(dt.getMonth()+1)+"/"+dt.getDate();
  const isToday = d===todayStr();
  return {txt: md + (isToday?" (今天)":""), today:isToday};
}

/* ---------- render ---------- */
function render(){
  const q=document.getElementById("search").value.trim().toLowerCase();
  const sf=document.getElementById("statusFilter").value;
  const sort=document.getElementById("sort").value;

  let items=data.filter(it=>{
    if(filterCat!=="all" && it.cat!==filterCat) return false;
    if(sf==="active" && it.done) return false;
    if(sf==="done" && !it.done) return false;
    if(q){
      const blob=(it.title+" "+(it.note||"")+" "+it.cat+" "+it.status+" "+(it.docs||[]).map(d=>d.t).join(" ")+" "+(it.people||[]).map(p=>p.t).join(" ")).toLowerCase();
      if(!blob.includes(q)) return false;
    }
    return true;
  });

  const catRank={}; CATS.forEach((c,i)=>catRank[c.k]=i);
  items.sort((a,b)=>{
    if(a.done!==b.done) return a.done?1:-1;
    if(sort==="date"){
      if(!a.due) return 1; if(!b.due) return -1;
      return a.due<b.due?-1:1;
    }
    if(sort==="cat") return (catRank[a.cat]??9)-(catRank[b.cat]??9);
    return b.created-a.created;
  });

  const all=data.length, doneN=data.filter(i=>i.done).length;
  document.getElementById("count").textContent=`${all-doneN} 待辦 / 共 ${all}`;

  const list=document.getElementById("list");
  if(items.length===0){
    list.innerHTML=`<div class="empty"><div class="big">🗂️</div>還沒有符合條件的事項<br>點右下角 ＋ 新增，或從「⋯」選單載入範例</div>`;
    return;
  }

  let html="";
  if(filterCat==="all" && sort!=="date"){
    CATS.forEach(c=>{
      const grp=items.filter(i=>i.cat===c.k);
      if(!grp.length) return;
      html+=`<div class="group-title"><span class="dot" style="background:${c.color}"></span>${c.label}（${grp.length}）</div>`;
      grp.forEach(it=>html+=cardHTML(it));
    });
  }else{
    items.forEach(it=>html+=cardHTML(it));
  }
  list.innerHTML=html;
}

function cardHTML(it){
  const c=catOf(it.cat), di=dateInfo(it.due);
  return `<div class="card ${it.done?'done':''}" style="border-left-color:${c.color}">
    <div class="check ${it.done?'on':''}" onclick="toggle('${it.id}')">${it.done?'✓':''}</div>
    <div class="c-body" onclick="openForm('${it.id}')">
      <div class="c-title">${esc(it.title)}</div>
      <div class="c-meta">
        <span class="tag" style="background:${c.color}22;color:${c.color}">${c.label}</span>
        ${di?`<span class="date ${di.today?'today':''}">📅 ${di.txt}</span>`:""}
      </div>
      ${it.note?`<div class="c-note">📝 ${esc(it.note)}</div>`:`<div class="c-note" style="opacity:.5">📝 （尚無備註 / 進度記錄）</div>`}
    </div>
    <div class="c-act">
      <button class="icon-btn" title="加入 Google 日曆（手機/電腦關閉也會提醒）" onclick="event.stopPropagation();gcal('${it.id}')">📅</button>
      <button class="icon-btn" title="網頁內提醒（需開著網頁）" onclick="event.stopPropagation();openRemind('${it.id}')">${it.remind&&it.remind!=='none'?'🔔':'🔕'}</button>
      <button class="icon-btn" title="編輯" onclick="event.stopPropagation();openForm('${it.id}')">✏️</button>
    </div>
  </div>`;
}
function esc(s){ return (s||"").replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m])); }

/* ---------- actions ---------- */
function toggle(id){ const it=data.find(i=>i.id===id); if(it){it.done=!it.done; save();} }

/* ---------- doc checklist (in form) ---------- */
function renderDocs(){
  const box=document.getElementById("docList");
  if(!formDocs.length){ box.innerHTML=`<div class="doc-empty">尚未加入資料項目</div>`; return; }
  box.innerHTML=formDocs.map((d,i)=>`<div class="docrow">
      <input type="checkbox" ${d.done?'checked':''} onchange="formDocs[${i}].done=this.checked;renderDocs()">
      <span class="dt ${d.done?'done':''}">${esc(d.t)}</span>
      <span class="x" onclick="formDocs.splice(${i},1);renderDocs()">✕</span>
    </div>`).join("");
}
function addDoc(){
  const inp=document.getElementById("docInput");
  const v=inp.value.trim(); if(!v) return;
  formDocs.push({t:v, done:false}); inp.value=""; inp.focus(); renderDocs();
}
function renderPeople(){
  const box=document.getElementById("peopleList");
  if(!formPeople.length){ box.innerHTML=`<div class="doc-empty">尚未加入協作窗口</div>`; return; }
  box.innerHTML=formPeople.map((d,i)=>`<div class="docrow">
      <span class="dt" style="padding-left:4px">👤 ${esc(d.t)}</span>
      <span class="x" onclick="formPeople.splice(${i},1);renderPeople()">✕</span>
    </div>`).join("");
}
function addPerson(){
  const inp=document.getElementById("peopleInput");
  const v=inp.value.trim(); if(!v) return;
  formPeople.push({t:v}); inp.value=""; inp.focus(); renderPeople();
}

function openForm(id){
  closeMenu();
  if(id){
    const it=data.find(i=>i.id===id); if(!it) return;
    document.getElementById("formTitle").textContent="編輯事項";
    f_id.value=it.id; f_title.value=it.title; f_cat.value=it.cat;
    f_status.value=it.status; f_due.value=it.due||"";
    f_note.value=it.note||"";
    formDocs=(it.docs||[]).map(d=>({...d}));
    formPeople=(it.people||[]).map(p=>({...p}));
    document.getElementById("delBtn").style.display="block";
  }else{
    document.getElementById("formTitle").textContent="新增事項";
    f_id.value=""; f_title.value=""; f_cat.value=filterCat==="all"?CATS[0].k:filterCat;
    f_status.value=STATUS[0]; f_due.value="";
    f_note.value=""; formDocs=[]; formPeople=[];
    document.getElementById("delBtn").style.display="none";
  }
  renderPeople(); renderDocs();
  document.getElementById("overlay").classList.add("on");
}
function closeForm(){ document.getElementById("overlay").classList.remove("on"); }

function saveItem(){
  const title=f_title.value.trim();
  if(!title){ f_title.focus(); f_title.style.borderColor="#b91c1c"; return; }
  const id=f_id.value;
  const fields={title, cat:f_cat.value, status:f_status.value,
    due:f_due.value, note:f_note.value.trim(),
    docs:formDocs.map(d=>({...d})), people:formPeople.map(p=>({...p}))};
  if(id){ Object.assign(data.find(i=>i.id===id), fields); }
  else{ data.push({id:uid(), ...fields, remind:"none", done:false, created:Date.now()}); }
  closeForm(); save();
}
function delItem(){
  const id=f_id.value; if(!id) return;
  if(confirm("確定刪除這筆事項？")){ data=data.filter(i=>i.id!==id); closeForm(); save(); }
}
function clearDone(){
  closeMenu();
  if(!data.some(i=>i.done)){ alert("目前沒有已完成的項目"); return; }
  if(confirm("清除所有已完成的項目？")){ data=data.filter(i=>!i.done); save(); }
}
function clearAll(){
  closeMenu();
  if(!data.length){ alert("目前沒有資料"); return; }
  if(confirm("確定清除全部 "+data.length+" 筆事項？\n（若已連線雲端，會一併清空雲端，無法復原）")){
    data=[]; save();
  }
}

/* ---------- reminders ---------- */
function askNotify(){
  closeMenu();
  if(!("Notification" in window)){ alert("此瀏覽器不支援桌面通知"); return; }
  Notification.requestPermission().then(p=>{
    alert(p==="granted" ? "已開啟通知！提醒會在你打開此網頁時跳出。" : "通知未開啟，可到瀏覽器網站設定開啟。");
  });
}
function openRemind(id){
  const it=data.find(i=>i.id===id); if(!it) return;
  r_id.value=id;
  document.getElementById("r_title").textContent=it.title;
  let type = it.remind==="none"||!it.remind ? "none" : (it.remind==="daily"?"daily":"date");
  document.querySelectorAll('input[name=rtype]').forEach(r=>r.checked=(r.value===type));
  document.getElementById("r_date").value = (type==="date")?it.remind:(it.due||todayStr());
  syncRdate();
  document.getElementById("remindOverlay").classList.add("on");
}
function syncRdate(){
  const v=document.querySelector('input[name=rtype]:checked');
  const t=v?v.value:"none";
  document.getElementById("rdateWrap").style.display = t==="date"?"block":"none";
  document.querySelectorAll('#ropt label').forEach(l=>{
    l.classList.toggle('sel', l.querySelector('input').checked);
  });
}
document.querySelectorAll('input[name=rtype]').forEach(r=>r.onchange=syncRdate);
function saveRemind(){
  const it=data.find(i=>i.id===r_id.value); if(!it) return;
  const t=document.querySelector('input[name=rtype]:checked').value;
  if(t==="none") it.remind="none";
  else if(t==="daily") it.remind="daily";
  else{ const d=document.getElementById("r_date").value; if(!d){alert("請選擇提醒日期");return;} it.remind=d; }
  it.lastNotified="";
  closeRemind(); save();
  if(t!=="none" && Notification && Notification.permission!=="granted") askNotify();
}
function closeRemind(){ document.getElementById("remindOverlay").classList.remove("on"); }

/* ---------- Google 日曆（背景提醒，關閉網頁也會通知） ---------- */
function gcal(id){
  const it=data.find(i=>i.id===id); if(!it) return;
  const date=(it.due||todayStr()).replace(/-/g,"");
  const start=date+"T100000", end=date+"T103000";
  let details="類別："+catOf(it.cat).label;
  if(it.note) details+="\n備註／進度："+it.note;
  if(it.people&&it.people.length) details+="\n協作窗口："+it.people.map(p=>p.t).join("、");
  if(it.docs&&it.docs.length) details+="\n資料："+it.docs.map(d=>(d.done?"✓":"□")+d.t).join("、");
  const url="https://calendar.google.com/calendar/render?action=TEMPLATE"
    +"&text="+encodeURIComponent("【待辦】"+it.title)
    +"&dates="+start+"/"+end
    +"&ctz=Asia/Taipei"
    +"&details="+encodeURIComponent(details);
  window.open(url,"_blank","noopener");
}

function checkReminders(){
  if(!("Notification" in window) || Notification.permission!=="granted") return;
  const now=new Date();
  const today=todayStr();
  const past10 = now.getHours()>=REMIND_HOUR;        // 已過早上10點
  const workday = isWorkday(today, now.getDay());     // 工作日（非週末／國定假日）
  let changed=false;
  data.forEach(it=>{
    if(it.done || !it.remind || it.remind==="none") return;
    let fire=false;
    if(it.remind==="daily"){ if(workday && past10 && it.lastNotified!==today) fire=true; }
    else { if(it.remind<=today && it.lastNotified!==today) fire=true; }
    if(fire){
      try{ new Notification("📋 待辦提醒", {body:it.title+(it.due?(" · "+it.due):"")}); }catch(e){}
      it.lastNotified=today;
      if(it.remind!=="daily") it.remind="none";
      changed=true;
    }
  });
  if(changed){ localStorage.setItem(KEY,JSON.stringify(data)); render(); }
}

/* ---------- export / import ---------- */
function exportJSON(){ closeMenu(); dl(JSON.stringify(data,null,2), "待辦備份_"+stamp()+".json", "application/json"); }
function exportCSV(){
  closeMenu();
  const head=["事項","類別","狀態","日期","協作窗口","資料完成","資料清單","備註/進度記錄","完成"];
  const rows=data.map(i=>{
    const docs=i.docs||[]; const dn=docs.filter(d=>d.done).length;
    const ppl=i.people||[];
    return [i.title,catOf(i.cat).label,i.status,i.due||"",
      ppl.map(p=>p.t).join(" / "),
      docs.length?(dn+"/"+docs.length):"", docs.map(d=>(d.done?"✓":"□")+d.t).join(" / "),
      (i.note||"").replace(/\n/g," "), i.done?"是":"否"];
  });
  const csv=[head,...rows].map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(",")).join("\r\n");
  dl("﻿"+csv, "待辦清單_"+stamp()+".csv", "text/csv");
}
function importJSON(e){
  const file=e.target.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      const arr=JSON.parse(r.result); if(!Array.isArray(arr)) throw 0;
      if(confirm("匯入 "+arr.length+" 筆。\n確定=合併到現有資料，取消=放棄")){
        const ids=new Set(data.map(i=>i.id));
        arr.forEach(it=>{ if(it.cat==="工程進場")it.cat="工程相關"; if(!it.docs)it.docs=[]; if(STATUS_MAP[it.status])it.status=STATUS_MAP[it.status]; if(!it.people){it.people=it.owner?[{t:it.owner,done:false}]:[];} delete it.seq; delete it.owner; if(!it.remind)it.remind="none"; if(!it.id||ids.has(it.id)) it.id=uid(); data.push(it); });
        save(); alert("匯入完成！");
      }
    }catch(err){ alert("檔案格式不正確"); }
    e.target.value="";
  };
  r.readAsText(file);
}
function dl(content,name,type){
  const b=new Blob([content],{type}); const u=URL.createObjectURL(b);
  const a=document.createElement("a"); a.href=u; a.download=name; a.click();
  setTimeout(()=>URL.revokeObjectURL(u),1000);
}
function stamp(){ const d=new Date(); return d.getFullYear()+("0"+(d.getMonth()+1)).slice(-2)+("0"+d.getDate()).slice(-2); }

/* ---------- 雲端同步（Google 試算表 + Apps Script，與工程系統相同方式）---------- */
const CLOUD_KEY="todo_cloud_url";
let cloudUrl=""; try{cloudUrl=localStorage.getItem(CLOUD_KEY)||"";}catch(e){}
let lastSyncJson="", skipPush=false, pushTimer=null, firstSync=true;
function setSync(s){
  const el=document.getElementById("syncBadge"); if(!el) return;
  const m={loading:"☁️ 讀取中…",syncing:"🔄 同步中…",synced:"✅ 已同步",error:"⚠ 連線失敗",off:""};
  el.textContent=m[s]||"";
  el.style.color=(s==="error")?"#b91c1c":(s==="synced"?"#16a34a":"#64748b");
}
function normalizeArr(arr){
  arr.forEach(it=>{
    if(it.cat==="工程進場")it.cat="工程相關";
    if(!it.docs)it.docs=[];
    if(!it.people)it.people=it.owner?[{t:it.owner}]:[];
    if(it.remind===undefined)it.remind="none";
    if(STATUS_MAP[it.status])it.status=STATUS_MAP[it.status];
    delete it.pri; delete it.seq; delete it.owner;
  });
  return arr;
}
function cloudPull(){
  if(!cloudUrl) return;
  setSync("loading");
  fetch(cloudUrl).then(r=>r.json()).then(arr=>{
    if(Array.isArray(arr)){
      if(arr.length){
        // 雲端有資料：以雲端為準
        const json=JSON.stringify(arr);
        if(json!==lastSyncJson){
          lastSyncJson=json; skipPush=true;
          data=normalizeArr(arr); render();
        }
      } else {
        // 雲端是空的
        if(firstSync && data.length){
          // 首次連線且本機有資料：上傳本機當基準（避免被空雲端清掉）
          lastSyncJson=""; cloudPush();
        } else if(data.length){
          // 連線後雲端變空（其他裝置已清空）：跟著清空
          skipPush=true; lastSyncJson="[]"; data=[]; render();
        } else {
          lastSyncJson="[]";
        }
      }
      firstSync=false;
    }
    setSync("synced");
  }).catch(()=>setSync("error"));
}
function cloudPush(){
  if(!cloudUrl) return;
  if(skipPush){ skipPush=false; return; }
  const json=JSON.stringify(data);
  if(json===lastSyncJson) return;
  setSync("syncing");
  clearTimeout(pushTimer);
  pushTimer=setTimeout(()=>{
    fetch(cloudUrl,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:json,mode:"no-cors"})
      .then(()=>{ lastSyncJson=json; setSync("synced"); })
      .catch(()=>setSync("error"));
  },1200);
}
function openCloud(){ closeMenu(); document.getElementById("cloudInput").value=cloudUrl; document.getElementById("cloudOverlay").classList.add("on"); }
function closeCloud(){ document.getElementById("cloudOverlay").classList.remove("on"); }
function saveCloud(){
  const u=document.getElementById("cloudInput").value.trim();
  try{ if(u)localStorage.setItem(CLOUD_KEY,u); else localStorage.removeItem(CLOUD_KEY); }catch(e){}
  cloudUrl=u; closeCloud();
  if(u){
    lastSyncJson=""; skipPush=false; firstSync=true;
    if(data.length){
      // 連線時本機已有資料：問使用者要以哪邊為主，避免本機資料被雲端蓋掉
      if(confirm("要把「這台目前的 "+data.length+" 筆資料」上傳並覆蓋雲端嗎？\n\n按「確定」＝以這台為主（上傳）\n按「取消」＝改用雲端現有的資料")){
        cloudPush();
      } else {
        cloudPull();
      }
    } else {
      cloudPull();
    }
  } else setSync("off");
}
